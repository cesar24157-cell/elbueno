
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 Lavanda Escolar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🌸 Jardín Escolar de Lavanda</h1>
        <p>Proyecto Educativo - Bienestar y Naturaleza</p>
    </header>

    <section>
        <h2>☀️ Clima del Jardín</h2>
        <div id="clima">Cargando clima...</div>
    </section>

    <section>
        <h2>📋 Recetas con Lavanda</h2>
        <div id="recetas">Cargando recetas...</div>
    </section>

    <section>
        <h2>🐝 Polinizadores</h2>
        <div id="polinizadores">Cargando...</div>
    </section>

    <section>
        <h2>💭 Opiniones de Estudiantes</h2>
        <div id="opiniones">Cargando opiniones...</div>
    </section>

    <section>
        <h2>Deja tu Comentario</h2>
        <form id="formOpinion">
            <input type="text" id="nombre" placeholder="Tu nombre" required>
            <textarea id="comentario" placeholder="¿Qué opinas del proyecto?" required></textarea>
            <button type="submit">Enviar Opinión</button>
        </form>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
